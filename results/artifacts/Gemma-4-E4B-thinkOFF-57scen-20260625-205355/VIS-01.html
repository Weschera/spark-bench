<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="solarSystemCanvas"></canvas>

    <script>
        const canvas = document.getElementById('solarSystemCanvas');
        const ctx = canvas.getContext('2d');

        let W, H;

        // --- Configuration ---
        const SUN_RADIUS = 30;
        const STAR_COUNT = 150;
        const PLANETS_DATA = [
            // { radius: orbital radius, speed: orbital speed (angular velocity), color: color, size: planet size }
            { radius: 80, speed: 0.02, color: '#a0a0ff', size: 10 },  // Mercury-like
            { radius: 140, speed: 0.015, color: '#ffcc66', size: 15 }, // Venus-like
            { radius: 210, speed: 0.01, color: '#cc66ff', size: 20 }, // Earth-like
            { radius: 290, speed: 0.007, color: '#ff9933', size: 22 }, // Mars-like
            { radius: 380, speed: 0.005, color: '#3399ff', size: 25 }, // Jupiter-like
            { radius: 500, speed: 0.003, color: '#9933cc', size: 28 }  // Saturn-like
        ];

        // --- State ---
        let planets = PLANETS_DATA.map(data => ({
            ...data,
            angle: Math.random() * Math.PI * 2, // Initial random angle
            x: 0,
            y: 0
        }));

        let stars = [];

        // --- Initialization ---
        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function createStars() {
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 1.5 + 0.5,
                    brightness: Math.random()
                });
            }
        }

        // --- Drawing Functions ---

        function drawStars() {
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawSun() {
            // Glow effect (outer halo)
            ctx.shadowBlur = 50;
            ctx.shadowColor = 'yellow';
            ctx.fillStyle = 'orange';
            ctx.beginPath();
            ctx.arc(W / 2, H / 2, SUN_RADIUS, 0, Math.PI * 2);
            ctx.fill();

            // Core
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'yellow';
            ctx.beginPath();
            ctx.arc(W / 2, H / 2, SUN_RADIUS * 0.6, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPlanet(planet) {
            // Calculate position based on orbital mechanics (circular orbit around center)
            // Center of the system is (W/2, H/2)
            const centerX = W / 2;
            const centerY = H / 2;

            // Update angle and calculate new position
            planet.angle += planet.speed;
            planet.x = centerX + planet.radius * Math.cos(planet.angle);
            planet.y = centerY + planet.radius * Math.sin(planet.angle);

            // Draw the planet
            ctx.fillStyle = planet.color;
            ctx.beginPath();
            ctx.arc(planet.x, planet.y, planet.size, 0, Math.PI * 2);
            ctx.fill();

            // Optional: Draw a faint orbit path
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(centerX, centerY, planet.radius, 0, Math.PI * 2);
            ctx.stroke();
        }

        // --- Animation Loop ---
        function animate() {
            // 1. Clear the canvas (creates the "darkness")
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Slight trail effect by not fully clearing
            ctx.fillRect(0, 0, W, H);

            // 2. Draw background elements (Stars)
            drawStars();

            // 3. Draw the Sun at the center
            drawSun();

            // 4. Draw and update planets
            planets.forEach(drawPlanet);

            // 5. Request next frame
            requestAnimationFrame(animate);
        }

        // --- Setup and Start ---
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        createStars();
        animate();

    </script>
</body>
</html>
