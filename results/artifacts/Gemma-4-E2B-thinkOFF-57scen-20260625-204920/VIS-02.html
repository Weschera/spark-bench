<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spiral Galaxy Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // Configuration
        const numStars = 500;
        const coreRadius = Math.min(width, height) * 0.1;
        const coreColor = 'white';
        const starColorVariation = 0.5; // Controls how much color shifts
        const twinkleSpeed = 0.05; // Speed of twinkle effect
        const rotationSpeed = 0.005; // Speed of the spiral rotation
        const spiralTightness = 0.0005; // Controls how tightly the spiral wraps

        let stars = [];

        // Star Class Definition
        class Star {
            constructor(x, y, distance, angle, colorHue) {
                this.x = x;
                this.y = y;
                this.distance = distance; // Distance from the center
                this.angle = angle;     // Base angle for spiral positioning
                this.baseHue = colorHue; // Base hue for color variation
                this.size = Math.random() * 1.5 + 0.5;
                this.twinkle = Math.random() * 0.5 + 0.5; // Initial twinkle intensity
                this.opacity = 1.0;
                this.speed = Math.random() * 0.001 + 0.0005; // Individual speed for movement
            }

            update() {
                // Calculate position based on spiral motion
                const radius = this.distance + Math.sin(this.angle * 10 + Date.now() * 0.0001) * 0.5;
                const angleOffset = this.distance * spiralTightness;
                
                this.x = width / 2 + Math.cos(this.angle + angleOffset) * radius;
                this.y = height / 2 + Math.sin(this.angle + angleOffset) * radius;

                // Twinkle effect
                this.twinkle += (Math.random() - 0.5) * twinkleSpeed;
                this.opacity = Math.max(0.1, Math.min(1.0, this.twinkle));
            }

            draw() {
                const alpha = this.opacity;
                
                // Subtle color variation based on distance/angle
                const hue = (this.baseHue + (this.distance * 5) + Math.sin(this.angle * 5) * starColorVariation) % 360;
                
                ctx.fillStyle = `hsla(${hue}, 100%, 80%, ${alpha})`;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * (1 - alpha * 0.5), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialization Function
        function initStars() {
            for (let i = 0; i < numStars; i++) {
                // Distribute stars somewhat randomly, favoring the spiral structure
                const distance = Math.random() * (Math.min(width, height) * 0.8);
                const angle = Math.random() * Math.PI * 2; // 0 to 2*PI radians
                const hue = Math.random() * 360;

                stars.push(new Star(0, 0, distance, angle, hue));
            }
        }

        // Animation Loop
        function animate() {
            // 1. Clear the canvas (with a slight fade for a trailing effect)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // Low alpha creates a subtle trail
            ctx.fillRect(0, 0, width, height);

            // 2. Draw the Core (Bright center)
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Central bright point
            ctx.fillStyle = 'rgba(255, 255, 255, 1)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2);
            ctx.fill();


            // 3. Update and Draw Stars
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        // Handle resizing
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        // Start the simulation
        initStars();
        animate();

    </script>
</body>
</html>
