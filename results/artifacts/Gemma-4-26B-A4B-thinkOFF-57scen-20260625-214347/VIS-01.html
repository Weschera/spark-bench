<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Solar System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="solarCanvas"></canvas>

    <script>
        const canvas = document.getElementById('solarCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        const stars = [];
        const planets = [];

        // Configuration for planets: distance, radius, speed, color
        const planetData = [
            { dist: 60,  size: 4,  speed: 0.04,  color: '#A5A5A5' }, // Mercury-ish
            { dist: 90,  size: 7,  speed: 0.015, color: '#E3BB76' }, // Venus-ish
            { dist: 130, size: 8,  speed: 0.01,  color: '#2271B3' }, // Earth-ish
            { dist: 170, size: 6,  speed: 0.008, color: '#E27B58' }, // Mars-ish
            { dist: 240, size: 18, speed: 0.004, color: '#D39C7E' }, // Jupiter-ish
            { dist: 310, size: 14, speed: 0.002, color: '#C5AB6E' }, // Saturn-ish
            { dist: 370, size: 10, speed: 0.001, color: '#B8A598' }  // Uranus-ish
        ];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;

            // Generate static starfield
            stars.length = 0;
            for (let i = 0; i < 400; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5,
                    opacity: Math.random()
                });
            }

            // Initialize planets
            planets.length = 0;
            planetData.forEach(data => {
                planets.push({
                    distance: data.dist,
                    radius: data.size,
                    speed: data.speed,
                    color: data.color,
                    angle: Math.random() * Math.PI * 2 // Random starting position
                });
            });
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            // Draw Stars
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.globalAlpha = star.opacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Draw Sun
            const sunGradient = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 35);
            sunGradient.addColorStop(0, '#FFF5F2');
            sunGradient.addColorStop(0.2, '#FFD200');
            sunGradient.addColorStop(0.5, '#F7941E');
            sunGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.fill();

            // Draw Planets and Orbits
            planets.forEach(p => {
                // Draw Orbit Path
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(centerX, centerY, p.distance, 0, Math.PI * 2);
                ctx.stroke();

                // Calculate position
                p.angle += p.speed;
                const x = centerX + Math.cos(p.angle) * p.distance;
                const y = centerY + Math.sin(p.angle) * p.distance;

                // Draw Planet Glow
                const pGlow = ctx.createRadialGradient(x, y, 0, x, y, p.radius * 2);
                pGlow.addColorStop(0, p.color);
                pGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = pGlow;
                ctx.beginPath();
                ctx.arc(x, y, p.radius * 2, 0, Math.PI * 2);
                ctx.fill();

                // Draw Planet Body
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(x, y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);

        init();
        draw();
    </script>
</body>
</html>
