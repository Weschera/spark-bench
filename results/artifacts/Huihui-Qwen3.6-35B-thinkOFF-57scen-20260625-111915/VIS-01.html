<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="solarSystem"></canvas>
<script>
(function() {
  const canvas = document.getElementById('solarSystem');
  const ctx = canvas.getContext('2d');

  // Handle HiDPI displays
  const dpr = window.devicePixelRatio || 1;
  let W, H, centerX, centerY;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    centerX = W / 2;
    centerY = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  // Starfield
  const stars = [];
  function generateStars(count) {
    stars.length = 0;
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        brightness: Math.random() * 0.6 + 0.4,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }
  generateStars(600);
  window.addEventListener('resize', () => generateStars(600));

  // Sun glow layers
  const sunGlowLayers = [
    { radius: 80, color: 'rgba(255, 180, 50, 0.03)', spread: 80 },
    { radius: 60, color: 'rgba(255, 160, 30, 0.06)', spread: 60 },
    { radius: 40, color: 'rgba(255, 140, 20, 0.1)', spread: 40 },
    { radius: 25, color: 'rgba(255, 200, 80, 0.15)', spread: 25 },
    { radius: 18, color: 'rgba(255, 220, 100, 0.25)', spread: 18 },
    { radius: 12, color: 'rgba(255, 240, 150, 0.4)', spread: 12 }
  ];

  // Planet definitions
  const planets = [
    { name: 'Mercury', orbitRadius: 60,  radius: 3,  speed: 0.04,  color: '#b5b5b5', angle: Math.random() * Math.PI * 2, trailAlpha: 0.15 },
    { name: 'Venus',   orbitRadius: 95,  radius: 5,  speed: 0.028, color: '#e8c97a', angle: Math.random() * Math.PI * 2, trailAlpha: 0.15 },
    { name: 'Earth',   orbitRadius: 140, radius: 5.5, speed: 0.02,  color: '#4a90d9', angle: Math.random() * Math.PI * 2, trailAlpha: 0.15 },
    { name: 'Mars',    orbitRadius: 190, radius: 4,  speed: 0.016, color: '#c1440e', angle: Math.random() * Math.PI * 2, trailAlpha: 0.15 },
    { name: 'Jupiter', orbitRadius: 260, radius: 12, speed: 0.008, color: '#d4a056', angle: Math.random() * Math.PI * 2, trailAlpha: 0.12 },
    { name: 'Saturn',  orbitRadius: 340, radius: 10, speed: 0.006, color: '#e0c878', angle: Math.random() * Math.PI * 2, trailAlpha: 0.12, hasRings: true },
    { name: 'Uranus',  orbitRadius: 420, radius: 7,  speed: 0.004, color: '#7de0e0', angle: Math.random() * Math.PI * 2, trailAlpha: 0.12 },
    { name: 'Neptune', orbitRadius: 500, radius: 6.5, speed: 0.003, color: '#4466cc', angle: Math.random() * Math.PI * 2, trailAlpha: 0.12 }
  ];

  // Trail history for each planet
  const maxTrailLength = 120;
  planets.forEach(p => p.trail = []);

  // Animation
  let time = 0;

  function drawStars() {
    for (const star of stars) {
      const twinkle = Math.sin(time * star.twinkleSpeed + star.twinkleOffset);
      const alpha = star.brightness + twinkle * 0.2;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, alpha)})`;
      ctx.fill();
    }
  }

  function drawSunGlow() {
    const pulse = Math.sin(time * 0.01) * 0.05;
    for (const layer of sunGlowLayers) {
      const grad = ctx.createRadialGradient(centerX, centerY, layer.radius * 0.5, centerX, centerY, layer.radius + layer.spread);
      const baseAlpha = parseFloat(layer.color.match(/[\d.]+\)$/)[0]) + pulse;
      grad.addColorStop(0, layer.color.replace(/[\d.]+\)$/, `${baseAlpha})`));
      grad.addColorStop(1, layer.color.replace(/[\d.]+\)$/, '0)'));
      ctx.beginPath();
      ctx.arc(centerX, centerY, layer.radius + layer.spread, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }
  }

  function drawSun() {
    // Sun body with gradient
    const sunGrad = ctx.createRadialGradient(centerX - 3, centerY - 3, 0, centerX, centerY, 18);
    sunGrad.addColorStop(0, '#fff8e0');
    sunGrad.addColorStop(0.3, '#ffe066');
    sunGrad.addColorStop(0.7, '#ffaa22');
    sunGrad.addColorStop(1, '#ff6600');
    ctx.beginPath();
    ctx.arc(centerX, centerY, 18, 0, Math.PI * 2);
    ctx.fillStyle = sunGrad;
    ctx.fill();

    // Bright center
    ctx.beginPath();
    ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 240, 0.6)';
    ctx.fill();
  }

  function drawOrbitLines() {
    ctx.lineWidth = 0.5;
    for (const planet of planets) {
      ctx.beginPath();
      ctx.arc(centerX, centerY, planet.orbitRadius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
      ctx.stroke();
    }
  }

  function drawPlanetTrail(planet) {
    const trail = planet.trail;
    if (trail.length < 2) return;

    for (let i = 1; i < trail.length; i++) {
      const alpha = (i / trail.length) * planet.trailAlpha;
      ctx.beginPath();
      ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
      ctx.lineTo(trail[i].x, trail[i].y);
      ctx.strokeStyle = planet.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
      // Parse hex color for alpha handling
      const hex = planet.color;
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
      ctx.lineWidth = planet.radius * 0.4 * (i / trail.length);
      ctx.stroke();
    }
  }

  function drawPlanet(planet) {
    const px = centerX + Math.cos(planet.angle) * planet.orbitRadius;
    const py = centerY + Math.sin(planet.angle) * planet.orbitRadius;

    // Update trail
    planet.trail.push({ x: px, y: py });
    if (planet.trail.length > maxTrailLength) planet.trail.shift();

    // Draw trail
    drawPlanetTrail(planet);

    // Saturn rings (behind planet)
    if (planet.hasRings) {
      ctx.beginPath();
      ctx.ellipse(px, py, planet.radius * 2.2, planet.radius * 0.5, -0.3, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(210, 190, 140, 0.4)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(px, py, planet.radius * 1.8, planet.radius * 0.4, -0.3, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(210, 190, 140, 0.25)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Planet shadow (light source from sun)
    const shadowOffsetX = -Math.cos(planet.angle) * planet.radius * 0.3;
    const shadowOffsetY = -Math.sin(planet.angle) * planet.radius * 0.3;

    // Planet body
    const pGrad = ctx.createRadialGradient(
      px - shadowOffsetX + 1, py - shadowOffsetY + 1, 0,
      px, py, planet.radius
    );
    const hex = planet.color;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    pGrad.addColorStop(0, `rgb(${Math.min(255, r + 60)}, ${Math.min(255, g + 60)}, ${Math.min(255, b + 60)})`);
    pGrad.addColorStop(0.7, `rgb(${r}, ${g}, ${b})`);
    pGrad.addColorStop(1, `rgb(${Math.max(0, r - 40)}, ${Math.max(0, g - 40)}, ${Math.max(0, b - 40)})`);

    ctx.beginPath();
    ctx.arc(px, py, planet.radius, 0, Math.PI * 2);
    ctx.fillStyle = pGrad;
    ctx.fill();

    // Highlight
    ctx.beginPath();
    ctx.arc(px - planet.radius * 0.3, py - planet.radius * 0.3, planet.radius * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, 0.15)`;
    ctx.fill();

    // Store current position for label positioning
    planet.currentX = px;
    planet.currentY = py;
  }

  function drawPlanetLabels() {
    ctx.font = '11px Arial, sans-serif';
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';

    for (const planet of planets) {
      if (planet.currentX !== undefined) {
        ctx.fillText(planet.name, planet.currentX, planet.currentY - planet.radius - 6);
      }
    }
  }

  function animate() {
    time++;

    // Clear canvas
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);

    // Draw layers
    drawStars();
    drawOrbitLines();
    drawSunGlow();
    drawSun();

    // Update and draw planets
    for (const planet of planets) {
      planet.angle += planet.speed;
      drawPlanet(planet);
    }

    drawPlanetLabels();

    requestAnimationFrame(animate);
  }

  animate();
})();
</script>
</body>
</html>
