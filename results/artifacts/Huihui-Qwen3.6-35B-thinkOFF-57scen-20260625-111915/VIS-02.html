<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiral Galaxy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="galaxy"></canvas>
<script>
(function() {
    const canvas = document.getElementById('galaxy');
    const ctx = canvas.getContext('2d');

    let W, H, cx, cy, maxRadius;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
        maxRadius = Math.min(W, H) * 0.45;
    }
    resize();
    window.addEventListener('resize', resize);

    const ARM_COUNT = 5;
    const STAR_COUNT = 800;
    const CORE_STARS = 150;

    const COLORS = [
        [220, 230, 255], // blue-white
        [255, 240, 220], // yellow-white
        [200, 210, 255], // blue
        [255, 200, 180], // warm white
        [180, 200, 255], // light blue
        [255, 255, 255], // white
        [255, 180, 160], // reddish
        [160, 180, 255], // deep blue
    ];

    class Star {
        constructor(isCore) {
            this.isCore = isCore;
            if (isCore) {
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.random() * maxRadius * 0.15;
                this.size = Math.random() * 2.5 + 0.5;
                this.speed = 0.0003 + Math.random() * 0.0004;
            } else {
                const arm = Math.floor(Math.random() * ARM_COUNT);
                const armAngle = (arm / ARM_COUNT) * Math.PI * 2;
                const armSpread = 0.35;
                this.angle = armAngle + (Math.random() - 0.5) * armSpread;
                this.distance = Math.random() * maxRadius * 0.95 + maxRadius * 0.05;
                this.size = Math.random() * 2 + 0.3;
                this.speed = 0.0001 + (1 - this.distance / maxRadius) * 0.0006;
            }
            const col = COLORS[Math.floor(Math.random() * COLORS.length)];
            this.color = col;
            this.colorR = col[0];
            this.colorG = col[1];
            this.colorB = col[2];
            this.twinklePhase = Math.random() * Math.PI * 2;
            this.twinkleSpeed = 0.005 + Math.random() * 0.02;
            this.baseAlpha = 0.4 + Math.random() * 0.6;
        }

        update(time) {
            this.angle += this.speed;
            const twinkle = Math.sin(time * this.twinkleSpeed + this.twinklePhase);
            this.alpha = this.baseAlpha + twinkle * 0.25;
            if (this.alpha < 0.1) this.alpha = 0.1;
            if (this.alpha > 1) this.alpha = 1;
        }

        draw(ctx) {
            const x = cx + Math.cos(this.angle) * this.distance;
            const y = cy + Math.sin(this.angle) * this.distance;

            const r = Math.round(this.colorR + Math.sin(this.twinklePhase + time * this.twinkleSpeed * 0.5) * 20);
            const g = Math.round(this.colorG + Math.sin(this.twinklePhase + time * this.twinkleSpeed * 0.5 + 1) * 15);
            const b = Math.round(this.colorB + Math.sin(this.twinklePhase + time * this.twinkleSpeed * 0.5 + 2) * 20);

            const alpha = this.alpha;
            const sz = this.size;

            if (sz > 1.5 && !this.isCore) {
                ctx.beginPath();
                ctx.arc(x, y, sz * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.15})`;
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(x, y, sz, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.fill();
        }
    }

    let stars = [];
    let time = 0;

    function initStars() {
        stars = [];
        for (let i = 0; i < CORE_STARS; i++) {
            stars.push(new Star(true));
        }
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push(new Star(false));
        }
    }
    initStars();

    function drawCoreGlow() {
        const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius * 0.25);
        gradient.addColorStop(0, 'rgba(255, 240, 200, 0.35)');
        gradient.addColorStop(0.3, 'rgba(200, 210, 255, 0.12)');
        gradient.addColorStop(0.7, 'rgba(150, 170, 240, 0.04)');
        gradient.addColorStop(1, 'rgba(100, 130, 220, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);
    }

    function animate() {
        time++;
        ctx.fillStyle = 'rgba(0, 0, 0, 1)';
        ctx.fillRect(0, 0, W, H);

        drawCoreGlow();

        for (const star of stars) {
            star.update(time);
            star.draw(ctx);
        }

        requestAnimationFrame(animate);
    }

    animate();
})();
</script>
</body>
</html>
