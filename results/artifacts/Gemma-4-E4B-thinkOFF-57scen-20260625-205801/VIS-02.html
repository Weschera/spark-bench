<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Galaxy Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // --- Galaxy Parameters ---
        const numStars = 400;
        const coreRadius = 50;
        const spiralArms = 3;
        const galaxyRadius = Math.min(width, height) / 2.5;
        const rotationSpeed = 0.005; // Speed of the overall rotation

        let stars = [];

        // Helper function for random number generation
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Star class
        class Star {
            constructor(index) {
                this.id = index;
                this.baseRadius = random(1, 3);
                this.colorHue = random(0, 360); // Base color variation
                this.twinkleFactor = random(0.5, 1.5); // Controls twinkling intensity

                // Assign initial position based on spiral structure
                const armIndex = Math.floor(random(0, spiralArms));
                const armSpread = 0.5; // How tightly the arms are wound

                // Determine the angle and radius based on the arm structure
                let r_factor = random(0.1, 1.0);
                let theta_base = random(0, 2 * Math.PI);

                // Spiral equation approximation: r = a * exp(b * theta)
                // We adjust the parameters to create a visible spiral shape
                const a = galaxyRadius * 0.1;
                const b = 1.5;

                // Position calculation for a spiral arm
                let r = a * Math.exp(b * (theta_base + armIndex * (Math.PI * 2 / spiralArms)));
                
                // Add some noise to the radius and angle for a more natural look
                r *= random(0.8, 1.2);
                theta_base += random(-0.1, 0.1);

                this.x = r * Math.cos(theta_base);
                this.y = r * Math.sin(theta_base);
                
                this.vx = 0; // Velocity components (we'll handle rotation via transformation)
                this.vy = 0;
            }

            draw(ctx, time) {
                // Twinkle effect: modulate opacity based on time and twinkleFactor
                const twinkle = Math.sin(time * 5 + this.id * 0.1) * 0.5 + 0.5; // 0 to 1 cycle
                const opacity = 0.4 + twinkle * 0.6 * this.twinkleFactor;

                // Calculate current position based on rotation
                // We rotate the entire system around the center (0, 0)
                const angle = time * rotationSpeed;
                
                // Apply rotation matrix transformation
                const rotatedX = this.x * Math.cos(angle) - this.y * Math.sin(angle);
                const rotatedY = this.x * Math.sin(angle) + this.y * Math.cos(angle);

                // Calculate size based on distance from core (brighter near core)
                const distance = Math.sqrt(this.x * this.x + this.y * this.y);
                const size = this.baseRadius * (1 - (distance / galaxyRadius)) * 2 + 0.5;
                
                // Color variation: Hue shifting based on position/index
                const hue = (this.colorHue + distance * 0.5) % 360;

                ctx.fillStyle = `hsla(${hue}, 80%, 70%, ${opacity})`;
                
                ctx.beginPath();
                ctx.arc(rotatedX, rotatedY, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialization
        function initializeStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push(new Star(i));
            }
        }

        // Animation loop
        let startTime = Date.now();

        function animate(currentTime) {
            const time = (currentTime - startTime) / 1000; // Time in seconds

            // Clear canvas (Black background)
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // Draw Core (Bright center)
            const coreGlow = 100;
            const gradient = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, coreGlow);
            gradient.addColorStop(0, 'rgba(255, 255, 200, 1)');
            gradient.addColorStop(0.5, 'rgba(255, 165, 0, 0.5)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(width / 2, height / 2, coreGlow, 0, Math.PI * 2);
            ctx.fill();


            // Draw Stars
            for (const star of stars) {
                star.draw(ctx, time);
            }

            requestAnimationFrame(animate);
        }

        // Handle resizing
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            // Re-center the drawing context logic if needed, but for this effect, resizing the canvas is enough.
        });

        // Start the animation
        initializeStars();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
