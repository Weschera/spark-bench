<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
            background: #000;
            cursor: default;
        }
    </style>
</head>
<body>
    <canvas id="solarCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('solarCanvas');
            const ctx = canvas.getContext('2d');

            let W, H, cx, cy, maxOrbit;

            // ─── Planet Data ───────────────────────────────────────────────
            const PLANET_DATA = [{
                name: 'Mercury',
                radius: 3,
                orbitFactor: 0.16,
                speed: 4.15,
                color: '#b5b5b5',
                glow: '#888'
            }, {
                name: 'Venus',
                radius: 5,
                orbitFactor: 0.26,
                speed: 1.62,
                color: '#e8cda0',
                glow: '#c9b080'
            }, {
                name: 'Earth',
                radius: 6,
                orbitFactor: 0.36,
                speed: 1.00,
                color: '#4b8bbe',
                glow: '#3a7aaa'
            }, {
                name: 'Mars',
                radius: 4,
                orbitFactor: 0.46,
                speed: 0.53,
                color: '#c1440e',
                glow: '#a33a0c'
            }, {
                name: 'Jupiter',
                radius: 14,
                orbitFactor: 0.60,
                speed: 0.084,
                color: '#d4a574',
                glow: '#b8895e'
            }, {
                name: 'Saturn',
                radius: 11,
                orbitFactor: 0.74,
                speed: 0.034,
                color: '#ead6b8',
                glow: '#c9b89a',
                rings: true
            }, {
                name: 'Uranus',
                radius: 7,
                orbitFactor: 0.88,
                speed: 0.012,
                color: '#7ec8e3',
                glow: '#5aadcc'
            }];

            // ─── Starfield ─────────────────────────────────────────────────
            let stars = [];

            function generateStars(count) {
                stars = [];
                for (let i = 0; i < count; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 1.8 + 0.3,
                        alpha: Math.random() * 0.7 + 0.3,
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }
            }

            // ─── Resize ────────────────────────────────────────────────────
            function resize() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W;
                canvas.height = H;
                cx = W / 2;
                cy = H / 2;
                maxOrbit = Math.min(W, H) * 0.40;
                generateStars(350);
            }

            window.addEventListener('resize', resize);
            resize();

            // ─── Planet State ──────────────────────────────────────────────
            let planets = [];
            let time = 0;

            function initPlanets() {
                planets = PLANET_DATA.map((data) => {
                    return {
                        ...data,
                        orbit: data.orbitFactor * maxOrbit,
                        angle: Math.random() * Math.PI * 2,
                        // Slight random phase offset
                        phase: Math.random() * Math.PI * 2
                    };
                });
            }
            initPlanets();

            // ─── Drawing Helpers ───────────────────────────────────────────

            function drawStarfield() {
                for (const star of stars) {
                    const twinkle = 0.6 + 0.4 * Math.sin(time * star.twinkleSpeed + star.twinklePhase);
                    const alpha = star.alpha * twinkle;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                }
            }

            function drawOrbitalPaths() {
                ctx.lineWidth = 0.8;
                for (const planet of planets) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, planet.orbit, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.08)`;
                    ctx.setLineDash([4, 6]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            function drawSun() {
                const sunRadius = Math.max(28, maxOrbit * 0.055);

                // Outer glow layer 1 (large, faint)
                const grad1 = ctx.createRadialGradient(cx, cy, sunRadius * 0.2, cx, cy, sunRadius * 4.5);
                grad1.addColorStop(0, 'rgba(255, 220, 100, 0.15)');
                grad1.addColorStop(0.3, 'rgba(255, 180, 50, 0.06)');
                grad1.addColorStop(1, 'rgba(255, 150, 0, 0)');
                ctx.beginPath();
                ctx.arc(cx, cy, sunRadius * 4.5, 0, Math.PI * 2);
                ctx.fillStyle = grad1;
                ctx.fill();

                // Outer glow layer 2 (medium)
                const grad2 = ctx.createRadialGradient(cx, cy, sunRadius * 0.3, cx, cy, sunRadius * 2.8);
                grad2.addColorStop(0, 'rgba(255, 230, 150, 0.25)');
                grad2.addColorStop(0.5, 'rgba(255, 200, 80, 0.10)');
                grad2.addColorStop(1, 'rgba(255, 150, 0, 0)');
                ctx.beginPath();
                ctx.arc(cx, cy, sunRadius * 2.8, 0, Math.PI * 2);
                ctx.fillStyle = grad2;
                ctx.fill();

                // Sun body
                const grad3 = ctx.createRadialGradient(
                    cx - sunRadius * 0.25, cy - sunRadius * 0.25, sunRadius * 0.1,
                    cx, cy, sunRadius
                );
                grad3.addColorStop(0, '#fffbe6');
                grad3.addColorStop(0.2, '#ffe566');
                grad3.addColorStop(0.5, '#ffaa33');
                grad3.addColorStop(0.8, '#ff7700');
                grad3.addColorStop(1, '#cc5500');
                ctx.shadowColor = '#ffaa33';
                ctx.shadowBlur = sunRadius * 1.2;
                ctx.beginPath();
                ctx.arc(cx, cy, sunRadius, 0, Math.PI * 2);
                ctx.fillStyle = grad3;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Inner bright core
                const grad4 = ctx.createRadialGradient(
                    cx - sunRadius * 0.15, cy - sunRadius * 0.15, 0,
                    cx - sunRadius * 0.15, cy - sunRadius * 0.15, sunRadius * 0.5
                );
                grad4.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                grad4.addColorStop(0.5, 'rgba(255, 255, 220, 0.4)');
                grad4.addColorStop(1, 'rgba(255, 255, 200, 0)');
                ctx.beginPath();
                ctx.arc(cx, cy, sunRadius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = grad4;
                ctx.fill();

                // Subtle pulsing corona
                const pulse = 1 + 0.02 * Math.sin(time * 0.8);
                const coronaRadius = sunRadius * 1.4 * pulse;
                const grad5 = ctx.createRadialGradient(cx, cy, sunRadius * 0.8, cx, cy, coronaRadius);
                grad5.addColorStop(0, 'rgba(255, 200, 100, 0.12)');
                grad5.addColorStop(0.6, 'rgba(255, 160, 50, 0.05)');
                grad5.addColorStop(1, 'rgba(255, 120, 0, 0)');
                ctx.beginPath();
                ctx.arc(cx, cy, coronaRadius, 0, Math.PI * 2);
                ctx.fillStyle = grad5;
                ctx.fill();
            }

            function drawPlanet(planet, idx) {
                const x = cx + planet.orbit * Math.cos(planet.angle);
                const y = cy + planet.orbit * Math.sin(planet.angle);
                const r = planet.radius;

                // Planet glow
                ctx.shadowColor = planet.glow;
                ctx.shadowBlur = r * 1.5;

                // Planet body with 3D gradient
                const grad = ctx.createRadialGradient(
                    x - r * 0.3, y - r * 0.3, r * 0.1,
                    x, y, r
                );
                // Lighten the color for the highlight
                const baseColor = planet.color;
                const highlight = lightenColor(baseColor, 40);
                const shadow = darkenColor(baseColor, 30);
                grad.addColorStop(0, highlight);
                grad.addColorStop(0.4, baseColor);
                grad.addColorStop(1, shadow);

                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Saturn rings
                if (planet.rings) {
                    ctx.shadowBlur = 0;
                    const ringTilt = 0.3;
                    const ringOuter = r * 1.8;
                    const ringInner = r * 1.2;
                    ctx.beginPath();
                    ctx.ellipse(x, y, ringOuter, ringOuter * ringTilt, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(210, 190, 160, 0.5)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.ellipse(x, y, ringInner, ringInner * ringTilt, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(180, 160, 130, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Re-apply shadow for the planet body (drawn again on top)
                    ctx.shadowColor = planet.glow;
                    ctx.shadowBlur = r * 1.5;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                }

                ctx.shadowBlur = 0;

                // Planet label
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = '10px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(planet.name, x, y + r + 5);
            }

            // ─── Color Helpers ─────────────────────────────────────────────
            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 200, g: 200, b: 200 };
            }

            function rgbToHex(r, g, b) {
                return '#' + [r, g, b].map(c => {
                    const clamped = Math.max(0, Math.min(255, Math.round(c)));
                    return clamped.toString(16).padStart(2, '0');
                }).join('');
            }

            function lightenColor(hex, amount) {
                const rgb = hexToRgb(hex);
                return rgbToHex(
                    rgb.r + amount,
                    rgb.g + amount,
                    rgb.b + amount
                );
            }

            function darkenColor(hex, amount) {
                const rgb = hexToRgb(hex);
                return rgbToHex(
                    rgb.r - amount,
                    rgb.g - amount,
                    rgb.b - amount
                );
            }

            // ─── Animation Loop ────────────────────────────────────────────
            let lastTime = 0;

            function animate(timestamp) {
                const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
                lastTime = timestamp;
                time += dt;

                // Update planet angles
                for (const planet of planets) {
                    planet.angle += planet.speed * dt * 0.8;
                }

                // ─── Draw ──────────────────────────────────────────────────
                ctx.clearRect(0, 0, W, H);

                // Dark background (already black from CSS, but ensure)
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);

                drawStarfield();
                drawOrbitalPaths();
                drawSun();

                // Draw planets in order of orbit (inner first)
                for (const planet of planets) {
                    drawPlanet(planet);
                }

                // Optional: subtle vignette
                const vigGrad = ctx.createRadialGradient(cx, cy, maxOrbit * 0.6, cx, cy, maxOrbit * 1.2);
                vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vigGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
                ctx.fillStyle = vigGrad;
                ctx.fillRect(0, 0, W, H);

                requestAnimationFrame(animate);
            }

            // ─── Start ─────────────────────────────────────────────────────
            requestAnimationFrame(animate);

            // ─── Handle resize for planet orbits ──────────────────────────
            // Override resize to also reinitialize planets
            const originalResize = resize;
            resize = function() {
                originalResize();
                // Recalculate orbits based on new maxOrbit
                for (let i = 0; i < planets.length; i++) {
                    planets[i].orbit = PLANET_DATA[i].orbitFactor * maxOrbit;
                }
            };
            window.removeEventListener('resize', resize);
            window.addEventListener('resize', resize);

        })();
    </script>
</body>
</html>
